<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>
    <main>
        <header>
            <h1>WDD 130 | HTML form - User Poll</h1>
        </header>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item column2">
                    <label for="fullname">Full Name: </label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-item column2">
                    <label for="useremail">Email Address:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Questions</legend>
                <div class="form-item column1">
                    <label for="browser">What is your favorite browser?</label>
                    <select id="browser" name="browser">
                        <option value="1"></option>
                        <option value="2">Chrome</option>
                        <option value="3">Edge</option>
                        <option value="4">Safari</option>
                        <option value="5">Opera</option>
                        <option value="6">Other</option>
                    </select>
                </div>
                <div class="form-item column1">
                    <label for="pet">Do you have a pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>
                <div class="form-item">
                    <label for="feedback">List the places you have lived:</label>
                    <textarea id="feedback" name="feedback" rows="5" placeholder="New york, Boston, Trenton..."></textarea>
                </div>
                <button type="submit">Submit Poll</button>
            </fieldset>
        </form>
    </main>
</body>

<footer>
    <p>©2026 | HTML & CSS Form Learning Activity | Ethan Bayer</p>
</footer>
