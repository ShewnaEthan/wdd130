<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <main class="box">
        <h1>Basic HTML and CSS quiz</h1>
        <form class="box">
            <div class="quiz-item box">
                <label for="q1">1. What does the acronym stand for? 
                    <input type="text" id="q1" name="q1"></label>
            </div>
            <div class="quiz-item box">
                <label for="q2">2. How are id and class atributes selected in CSS?</label>
                <textarea type="text" id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item box">
                <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select id="q3" name="q3">
                    <option value="" disable selected>Choose One...</option>
                    <option value="a">&lt;!--this is a comment--!&gt;</option>
                    <option value="b">/* this is a comment */</option>
                    <option value="c">// this is a comment</option>
                </select>
            </div>
            <div class="quiz-item box">
                <label for="q4">4. What does the acronym stand for?</label>
                <code class="box">margin: 10px 5px 15px;</code>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz for Grading</button>
        </form>
    </main>
</body>
</html>
