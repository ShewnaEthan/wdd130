<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Rafting Rapids Contact page. Submit feedback via this page's form.">
    <meta name="author" content="Ethan Bayer">
    <title>Rafting Rapids Contact Us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwr-logo.png"
          alt="Logo that says 'White Water Rafting' with red oars on the upper left and a splash effect on the lower left">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="contact-info">
            <h1 class="">Rafting Rapids</h1>
            <p>123 Stream Road</p>
            <p>Hodenpyl Trail, Mesick, MI 49668</p>
            <p>+1 234 567 8910</p>
            <p>support@wwr.com</p>
            
        </div>
        <div class="contact-form">
            <div>
                    <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d22819.76940685418!2d-85.82297445625699!3d44.3619136589079!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x881e591dea1a5e77%3A0xc03023c6d308911c!2sManistee%20River%20Trail!5e0!3m2!1sen!2sus!4v1780434111392!5m2!1sen!2sus"
                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            <form>
                <div class="form-item">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe">
                </div>
                <div class="form-item">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="example@wwr.com">
                </div>
                <div class="purpose">
                    <p>Message Purpose</p>
                    <div>
                        <input type="radio" id="general" name="purpose">
                        <label for="general">General Inquiry</label>
                    </div>
                    <div>
                        <input type="radio" id="reservation" name="purpose">
                        <label for="reservation">Reservation Question</label>
                    </div>
                    <div>
                        <input type="radio" id="suggestion" name="purpose">
                        <label for="suggestion">Website Suggestion</label>
                    </div>
                </div>
                <div>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"></textarea>
                </div>
                <div class="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
                </div>
                <button type="submit">Contact Us</button>
            </form>
        </div>
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/jack-profile.jpg" alt="Far away shot of the turqouise turmoil river">
                <figcaption>Jack | Co-founder</figcaption>
            </figure>
            <figure>
                <img src="images/jill-profile.jpg" alt="3 different colored rafts floating down a calm river">
                <figcaption>Jill | Co-founder</figcaption>
            </figure>
            <figure>
                <img src="images/sam-profile.jpg" alt="A close up of a yellow raft going through white rapids.">
                <figcaption>Sam | Equipment Management</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>&copy;2026 🌊 Rafting Rapids 🌊 Ethan Bayer</p>
        <nav class="socialmedia">
            <a href="https://www.youtube.com/">
                <img src="images/youtube.png" alt="Youtube logo">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram-square.png" alt="Instagram logo">
            </a>
            <a href="https://www.facebook.com">
                <img src="images/facebook-square.png" alt="Facebook logo">
            </a>
        </nav>
    </footer>
</body>

</html>
