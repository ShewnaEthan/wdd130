<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rafting Rapids home page. ">
    <meta name="author" content="Ethan Bayer">
    <title>Rafting Rapids | Home Page</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwr-logo.png"
            alt="Logo that says 'White Water Rafting' with red oars on the upper left and a splash effect on the lower left">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="hero">
            <img src="images/rafting-hero-image.jpg" alt="3 rafts on wide white water river">
            <h1>Rafting Rapids</h1>
            <article>
                <img src="images/rafting-close-up.jpg" alt="A group of happy rafters">
                <p>Looking for the perfect weekend getawawy? Plan your adventure now!</p>
                <a href="trips.html" class="button-link">
                    Plan Now!
                </a>
            </article>
        </div>
        <section class="sign-up">
            <h2>Sign Up to Our Weekly Newsletter:</h2>
            <form>
                <div class="form-item">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe">
                </div>
                <div class="form-item">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="example@wwr.com">
                </div>
                <button>Subscribe</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy;2026 🌊 Rafting Rapids 🌊 Ethan Bayer</p>
        <nav class="socialmedia">
            <a href="https://www.youtube.com/">
                <img src="images/youtube.png" alt="Youtube logo">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram-square.png" alt="Instagram logo">
            </a>
            <a href="https://www.facebook.com">
                <img src="images/facebook-square.png" alt="Facebook logo">
            </a>
        </nav>
    </footer>
</body>

</html>
